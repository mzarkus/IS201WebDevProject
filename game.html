<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jungle Snake</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bungee+Shade&family=Nunito:wght@400;700;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0b1a0b;
            background-image:
                radial-gradient(ellipse at 20% 80%, rgba(34, 85, 34, 0.3) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(50, 100, 30, 0.2) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(20, 60, 20, 0.15) 0%, transparent 70%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Nunito', sans-serif;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 5 Q35 15 30 25 Q25 15 30 5Z' fill='rgba(40,80,30,0.08)'/%3E%3Cpath d='M10 35 Q15 45 10 55 Q5 45 10 35Z' fill='rgba(40,80,30,0.06)'/%3E%3Cpath d='M50 40 Q55 50 50 60 Q45 50 50 40Z' fill='rgba(40,80,30,0.05)'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        .game-wrapper {
            position: relative;
            z-index: 1;
            text-align: center;
        }

        h1 {
            font-family: 'Bungee Shade', cursive;
            font-size: 2.8rem;
            color: #4CAF50;
            text-shadow: 0 0 30px rgba(76, 175, 80, 0.3), 0 4px 8px rgba(0,0,0,0.5);
            margin-bottom: 5px;
            letter-spacing: 3px;
        }

        .subtitle {
            font-size: 0.85rem;
            color: #5a7a4a;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .back-link {
            font-family: 'Nunito', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            color: #5a7a4a;
            text-decoration: none;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 15px;
            display: inline-block;
            padding: 6px 16px;
            border: 1px solid #2E7D32;
            border-radius: 20px;
            transition: all 0.25s;
        }

        .back-link:hover {
            color: #8BC34A;
            border-color: #4CAF50;
            background: rgba(76, 175, 80, 0.1);
        }

        .score-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 502px;
            margin-bottom: 10px;
            padding: 0 5px;
        }

        .score-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .score-label {
            font-size: 0.75rem;
            color: #5a7a4a;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 700;
        }

        .score-value {
            font-family: 'Bungee Shade', cursive;
            font-size: 1.3rem;
            color: #8BC34A;
            text-shadow: 0 0 10px rgba(139, 195, 74, 0.3);
        }

        .canvas-container {
            position: relative;
            border: 3px solid #2E7D32;
            border-radius: 8px;
            box-shadow:
                0 0 40px rgba(46, 125, 50, 0.2),
                inset 0 0 60px rgba(0, 0, 0, 0.3),
                0 8px 32px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        canvas {
            display: block;
            background: #0d200d;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(5, 15, 5, 0.85);
            z-index: 10;
            transition: opacity 0.3s;
        }

        .overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .overlay-title {
            font-family: 'Bungee Shade', cursive;
            font-size: 2rem;
            color: #4CAF50;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(76, 175, 80, 0.4);
        }

        .overlay-subtitle {
            font-size: 1rem;
            color: #7a9a6a;
            margin-bottom: 25px;
        }

        .overlay-score {
            font-family: 'Bungee Shade', cursive;
            font-size: 3rem;
            color: #8BC34A;
            margin-bottom: 5px;
        }

        .overlay-score-label {
            font-size: 0.8rem;
            color: #5a7a4a;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        .btn {
            font-family: 'Nunito', sans-serif;
            font-size: 1rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            padding: 14px 40px;
            border: 2px solid #4CAF50;
            background: rgba(76, 175, 80, 0.1);
            color: #8BC34A;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.25s;
        }

        .btn:hover {
            background: #4CAF50;
            color: #0b1a0b;
            box-shadow: 0 0 25px rgba(76, 175, 80, 0.4);
            transform: scale(1.05);
        }

        .controls-hint {
            margin-top: 15px;
            font-size: 0.75rem;
            color: #3a5a2a;
            letter-spacing: 2px;
        }

        .vine-left, .vine-right {
            position: fixed;
            top: 0;
            width: 60px;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.15;
        }

        .vine-left {
            left: 0;
            background: linear-gradient(90deg, #2E7D32, transparent);
        }

        .vine-right {
            right: 0;
            background: linear-gradient(-90deg, #2E7D32, transparent);
        }

        .mobile-controls {
            display: none;
            margin-top: 15px;
            gap: 5px;
        }

        .d-pad {
            display: grid;
            grid-template-areas:
                ". up ."
                "left . right"
                ". down .";
            gap: 5px;
        }

        .d-btn {
            width: 55px;
            height: 55px;
            border: 2px solid #2E7D32;
            background: rgba(46, 125, 50, 0.15);
            color: #8BC34A;
            border-radius: 10px;
            font-size: 1.3rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        .d-btn:active {
            background: rgba(76, 175, 80, 0.4);
        }

        .d-btn.up { grid-area: up; }
        .d-btn.down { grid-area: down; }
        .d-btn.left { grid-area: left; }
        .d-btn.right { grid-area: right; }

        @media (max-width: 550px) {
            h1 { font-size: 1.8rem; }
            .score-bar { width: 322px; }
            .canvas-container { border-width: 2px; }
            .mobile-controls { display: flex; justify-content: center; }
            .controls-hint { display: none; }
        }
    </style>
</head>
<body>

<div class="vine-left"></div>
<div class="vine-right"></div>

<div class="game-wrapper">
    <a href="fromscratch.html" class="back-link">&#9664; Back to Home</a>
    <h1>Jungle Snake</h1>
    <div class="subtitle">Survive the wild</div>

    <div class="score-bar">
        <div class="score-item">
            <span class="score-label">Score</span>
            <span class="score-value" id="score">0</span>
        </div>
        <div class="score-item">
            <span class="score-label">Best</span>
            <span class="score-value" id="highscore">0</span>
        </div>
    </div>

    <div class="canvas-container">
        <canvas id="game" width="500" height="500"></canvas>

        <div class="overlay" id="startScreen">
            <div class="overlay-title">Jungle Snake</div>
            <div class="overlay-subtitle">Eat the fruit. Grow longer. Don't bite yourself.</div>
            <button class="btn" id="startBtn">Enter the Jungle</button>
            <div class="controls-hint">Arrow keys or WASD to move</div>
        </div>

        <div class="overlay hidden" id="deathScreen">
            <div class="overlay-title">You Perished</div>
            <div class="overlay-score" id="finalScore">0</div>
            <div class="overlay-score-label">Final Score</div>
            <button class="btn" id="restartBtn">Try Again</button>
        </div>
    </div>

    <div class="mobile-controls">
        <div class="d-pad">
            <button class="d-btn up" id="btnUp">&#9650;</button>
            <button class="d-btn left" id="btnLeft">&#9664;</button>
            <button class="d-btn right" id="btnRight">&#9654;</button>
            <button class="d-btn down" id="btnDown">&#9660;</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const highscoreEl = document.getElementById('highscore');
    const startScreen = document.getElementById('startScreen');
    const deathScreen = document.getElementById('deathScreen');
    const finalScoreEl = document.getElementById('finalScore');

    const CELL = 20;
    const COLS = canvas.width / CELL;
    const ROWS = canvas.height / CELL;

    let snake, direction, nextDirection, food, score, highScore, gameLoop, speed;
    let running = false;

    highScore = parseInt(localStorage.getItem('jungleSnakeHigh') || '0');
    highscoreEl.textContent = highScore;

    const SNAKE_COLORS = ['#4CAF50','#43A047','#388E3C','#2E7D32','#1B5E20'];
    const FOOD_COLORS = ['#FF6D00','#FF9100','#FFAB00','#FFD600'];

    function init() {
        const midX = Math.floor(COLS / 2);
        const midY = Math.floor(ROWS / 2);
        snake = [
            { x: midX, y: midY },
            { x: midX - 1, y: midY },
            { x: midX - 2, y: midY }
        ];
        direction = { x: 1, y: 0 };
        nextDirection = { x: 1, y: 0 };
        score = 0;
        speed = 120;
        scoreEl.textContent = '0';
        placeFood();
    }

    function placeFood() {
        let pos;
        do {
            pos = {
                x: Math.floor(Math.random() * COLS),
                y: Math.floor(Math.random() * ROWS)
            };
        } while (snake.some(s => s.x === pos.x && s.y === pos.y));
        food = pos;
        food.color = FOOD_COLORS[Math.floor(Math.random() * FOOD_COLORS.length)];
        food.pulse = 0;
    }

    function drawCheckerboard() {
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                ctx.fillStyle = (r + c) % 2 === 0 ? '#0f240f' : '#0d200d';
                ctx.fillRect(c * CELL, r * CELL, CELL, CELL);
            }
        }
    }

    function drawSnake() {
        snake.forEach((seg, i) => {
            const ratio = i / Math.max(snake.length - 1, 1);
            const colorIdx = Math.min(Math.floor(ratio * SNAKE_COLORS.length), SNAKE_COLORS.length - 1);
            const size = i === 0 ? CELL - 2 : CELL - 3;
            const offset = i === 0 ? 1 : 1.5;
            const radius = i === 0 ? 5 : 4;

            ctx.fillStyle = SNAKE_COLORS[colorIdx];
            ctx.shadowColor = i === 0 ? 'rgba(76,175,80,0.5)' : 'transparent';
            ctx.shadowBlur = i === 0 ? 8 : 0;

            ctx.beginPath();
            ctx.roundRect(seg.x * CELL + offset, seg.y * CELL + offset, size, size, radius);
            ctx.fill();

            ctx.shadowBlur = 0;

            if (i === 0) {
                ctx.fillStyle = '#C8E6C9';
                const eyeSize = 3;
                let ex1, ey1, ex2, ey2;
                if (direction.x === 1) {
                    ex1 = seg.x * CELL + 14; ey1 = seg.y * CELL + 6;
                    ex2 = seg.x * CELL + 14; ey2 = seg.y * CELL + 13;
                } else if (direction.x === -1) {
                    ex1 = seg.x * CELL + 5; ey1 = seg.y * CELL + 6;
                    ex2 = seg.x * CELL + 5; ey2 = seg.y * CELL + 13;
                } else if (direction.y === -1) {
                    ex1 = seg.x * CELL + 5; ey1 = seg.y * CELL + 5;
                    ex2 = seg.x * CELL + 13; ey2 = seg.y * CELL + 5;
                } else {
                    ex1 = seg.x * CELL + 5; ey1 = seg.y * CELL + 14;
                    ex2 = seg.x * CELL + 13; ey2 = seg.y * CELL + 14;
                }
                ctx.beginPath();
                ctx.arc(ex1, ey1, eyeSize, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(ex2, ey2, eyeSize, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#1B5E20';
                ctx.beginPath();
                ctx.arc(ex1, ey1, 1.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(ex2, ey2, 1.5, 0, Math.PI * 2);
                ctx.fill();
            }

            if (i > 0 && i % 3 === 0) {
                ctx.fillStyle = 'rgba(200,230,201,0.12)';
                ctx.beginPath();
                ctx.arc(seg.x * CELL + CELL / 2, seg.y * CELL + CELL / 2, 4, 0, Math.PI * 2);
                ctx.fill();
            }
        });
    }

    function drawFood() {
        food.pulse = (food.pulse || 0) + 0.08;
        const pulseSize = Math.sin(food.pulse) * 2;
        const baseSize = 7 + pulseSize;

        ctx.shadowColor = food.color;
        ctx.shadowBlur = 12;
        ctx.fillStyle = food.color;
        ctx.beginPath();
        ctx.arc(food.x * CELL + CELL / 2, food.y * CELL + CELL / 2, baseSize, 0, Math.PI * 2);
        ctx.fill();

        ctx.shadowBlur = 0;
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.beginPath();
        ctx.arc(food.x * CELL + CELL / 2 - 2, food.y * CELL + CELL / 2 - 2, 2.5, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#2E7D32';
        ctx.beginPath();
        ctx.ellipse(food.x * CELL + CELL / 2 + 1, food.y * CELL + CELL / 2 - baseSize + 1, 4, 2, Math.PI / 4, 0, Math.PI * 2);
        ctx.fill();
    }

    function update() {
        direction = { ...nextDirection };

        const head = {
            x: snake[0].x + direction.x,
            y: snake[0].y + direction.y
        };

        if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
            return die();
        }

        if (snake.some(s => s.x === head.x && s.y === head.y)) {
            return die();
        }

        snake.unshift(head);

        if (head.x === food.x && head.y === food.y) {
            score++;
            scoreEl.textContent = score;
            if (score > highScore) {
                highScore = score;
                highscoreEl.textContent = highScore;
                localStorage.setItem('jungleSnakeHigh', highScore);
            }
            placeFood();
            if (speed > 60) speed -= 2;
        } else {
            snake.pop();
        }
    }

    function draw() {
        drawCheckerboard();
        drawFood();
        drawSnake();
    }

    function die() {
        running = false;
        clearTimeout(gameLoop);
        finalScoreEl.textContent = score;
        deathScreen.classList.remove('hidden');
    }

    function tick() {
        if (!running) return;
        update();
        if (running) {
            draw();
            gameLoop = setTimeout(tick, speed);
        }
    }

    function startGame() {
        init();
        startScreen.classList.add('hidden');
        deathScreen.classList.add('hidden');
        running = true;
        draw();
        gameLoop = setTimeout(tick, speed);
    }

    document.getElementById('startBtn').addEventListener('click', startGame);
    document.getElementById('restartBtn').addEventListener('click', startGame);

    document.addEventListener('keydown', (e) => {
        if (!running && (e.key === ' ' || e.key === 'Enter')) {
            startGame();
            return;
        }

        switch(e.key) {
            case 'ArrowUp': case 'w': case 'W':
                if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
                e.preventDefault();
                break;
            case 'ArrowDown': case 's': case 'S':
                if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
                e.preventDefault();
                break;
            case 'ArrowLeft': case 'a': case 'A':
                if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
                e.preventDefault();
                break;
            case 'ArrowRight': case 'd': case 'D':
                if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
                e.preventDefault();
                break;
        }
    });

    document.getElementById('btnUp').addEventListener('click', () => {
        if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
    });
    document.getElementById('btnDown').addEventListener('click', () => {
        if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
    });
    document.getElementById('btnLeft').addEventListener('click', () => {
        if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
    });
    document.getElementById('btnRight').addEventListener('click', () => {
        if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
    });

    let touchStartX = 0, touchStartY = 0;
    canvas.addEventListener('touchstart', (e) => {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
    }, { passive: true });

    canvas.addEventListener('touchend', (e) => {
        const dx = e.changedTouches[0].clientX - touchStartX;
        const dy = e.changedTouches[0].clientY - touchStartY;
        if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
        if (Math.abs(dx) > Math.abs(dy)) {
            if (dx > 0 && direction.x !== -1) nextDirection = { x: 1, y: 0 };
            else if (dx < 0 && direction.x !== 1) nextDirection = { x: -1, y: 0 };
        } else {
            if (dy > 0 && direction.y !== -1) nextDirection = { x: 0, y: 1 };
            else if (dy < 0 && direction.y !== 1) nextDirection = { x: 0, y: -1 };
        }
    }, { passive: true });
</script>

</body>
</html>
